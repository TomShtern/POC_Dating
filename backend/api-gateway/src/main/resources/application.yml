spring:
  application:
    name: api-gateway
    version: 1.0.0

  server:
    port: 8080
    shutdown: graceful

  cloud:
    gateway:
      # Route definitions for microservices
      routes:
        # User Service Routes
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1

        # Match Service Routes
        - id: match-service
          uri: http://match-service:8082
          predicates:
            - Path=/api/matches/**
          filters:
            - StripPrefix=1

        # Chat Service Routes (including WebSocket)
        - id: chat-service
          uri: http://chat-service:8083
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1

        # Recommendation Service Routes
        - id: recommendation-service
          uri: http://recommendation-service:8084
          predicates:
            - Path=/api/recommendations/**
          filters:
            - StripPrefix=1

      # Default filter configuration
      default-filters:
        - name: Retry
          args:
            retries: 3
            statuses: SERVICE_UNAVAILABLE

  # Redis for distributed rate limiting and session management
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

# Security Configuration
security:
  jwt:
    secret: ${JWT_SECRET:change-me-with-a-secure-32-character-key-here}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Requested-With
    allow-credentials: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: DEBUG
    com.dating: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,gateway
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: DEBUG
    org.springframework.cloud.gateway: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
